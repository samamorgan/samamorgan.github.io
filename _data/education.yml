    WGU Washington was established in 2011 as a partnership between Western Governors University and the state of Washington with a unique mission to help Washingtonians obtain a high-quality education. When WGU was established in 1997, the founding governors realized that technology, the internet, and a new model of competency-based education could transform higher education by creating new opportunities for working adults.
